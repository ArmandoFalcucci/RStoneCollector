; ============================================================
;  Generic lithic-analysis starter schema for RStone
;
;  Use this as a starting point and adapt it to your protocol.
;  Edit in the Schema tab, or in any text editor.
;  Save your modified file as <YourSite>.cfg in the schemas/ folder.
;
;  Syntax reference: schemas/README.md
;
;  Features demonstrated:
;    [*Section Name*]   sections shown as breadcrumbs in the wizard
;    CARRY=True         pre-fill the value on the next record
;    REQUIRED=True      block save until filled
;    UNIQUE=True        used for update / duplicate / auto-increment
;    CONDITION1=...     show this field only if conditions met
;    MIN= / MAX=        numeric range validation
;    Flake/Core split   driven by a single RecordCategory field
; ============================================================

[E5]
TABLE=MySite
DATABASE=data/MySite.csv

; ─── 1. Identification ─────────────────────────────────────




[ID]
TYPE=TEXT
PROMPT=Specimen ID:
REQUIRED=True
CARRY=True

[Square]
TYPE=TEXT
PROMPT=Square:
CARRY=True





[Unit]
TYPE=TEXT
PROMPT=Unit / Layer:
CARRY=True





[BagNumber]
TYPE=TEXT
PROMPT=Bag number:
CARRY=True





[ToolNumber]
TYPE=TEXT
PROMPT=Tool number (if applicable):
CARRY=False

; ─── 2. Category split ─────────────────────────────────────




[RecordCategory]
TYPE=MENU
PROMPT=Is this a Flake or a Core?
MENU=Flake,Core
REQUIRED=True
CARRY=True





[RawMaterial]
TYPE=MENU
PROMPT=Raw material:
MENU=Quartzite,Quartz,Chert,Silcrete,Chalcedony,Agate,Hornfels,Sandstone,Other,Indeterminate
REQUIRED=True
CARRY=True





[OtherRawMaterialID]
TYPE=TEXT
PROMPT=Describe the raw material:
CONDITION1=RawMaterial Other





[HeatTreated]
TYPE=MENU
PROMPT=Visible evidence of heat treatment?
MENU=Yes,No,Indeterminate

; ─── 3. Artifact class ─────────────────────────────────────




[LithicArtifactClass]
TYPE=MENU
PROMPT=Lithic artifact class:
MENU=CompFlake,ProxButNearlyComp,FlakeFrag,Shatter,Splinter,Chunk,RetouchedPiece,Utilized,HammerManuport,Groundstone,None
REQUIRED=True
CONDITION1=RecordCategory Flake





[CoreClass]
TYPE=MENU
PROMPT=Core class:
MENU=CompleteCore,CoreFragment,CoreOnFlake,Bipolar,Indeterminate
REQUIRED=True
CONDITION1=RecordCategory Core

; ─── 4. Completeness & cortex (mostly flake-side) ─────────




[Completeness]
TYPE=MENU
PROMPT=Portion of the artifact:
MENU=Complete,Proximal,Mesial,Distal,LeftLateral,RightLateral,Fragment
CONDITION1=RecordCategory Flake AND
CONDITION2=LithicArtifactClass NOT Shatter,Splinter,Chunk,HammerManuport,Groundstone,None





[CortexArea]
TYPE=MENU
PROMPT=Cortex area:
MENU=0%,1-9%,10-40%,41-60%,61-90%,91-99%,100%,Indeterminate





[CortexType]
TYPE=MENU
PROMPT=Cortex type:
MENU=Cobble,Outcrop,Weathered,Fresh,Indeterminate
CONDITION1=CortexArea NOT 0%

; ─── 5. Dorsal surface (flake-side) ───────────────────────




[DorsalScarCount]
TYPE=NUMERIC
PROMPT=Dorsal scar count (>4mm):
MIN=0
MAX=30
CONDITION1=RecordCategory Flake AND
CONDITION2=LithicArtifactClass NOT Shatter,Splinter,Chunk,HammerManuport,Groundstone,None AND
CONDITION3=CortexArea NOT 100%





[DorsalDirection]
TYPE=MENU
PROMPT=Dominant scar direction:
MENU=Unidirectional,Bidirectional,Radial,Convergent,Crossed,Indeterminate
CONDITION1=DorsalScarCount NOT 0,1

; ─── 6. Platform (flake-side) ─────────────────────────────




[PlatformType]
TYPE=MENU
PROMPT=Platform type:
MENU=Cortical,Plain,Dihedral,Facetted,Punctiform,Crushed,Absent,Indeterminate
CONDITION1=RecordCategory Flake AND
CONDITION2=Completeness Complete,Proximal,ProxButNearlyComp,LeftLateral,RightLateral





[PlatformCortex]
TYPE=MENU
PROMPT=Platform cortex:
MENU=Yes,No,Partial,Indeterminate
CONDITION1=PlatformType NOT Absent,Indeterminate,Crushed





[PlatformWidth]
TYPE=NUMERIC
PROMPT=Platform width (mm):
MIN=0
MAX=200
CONDITION1=PlatformType NOT Absent,Indeterminate,Crushed





[PlatformThickness]
TYPE=NUMERIC
PROMPT=Platform thickness (mm):
MIN=0
MAX=100
CONDITION1=PlatformType NOT Absent,Indeterminate,Crushed

; ─── 7. Ventral surface (flake-side) ──────────────────────




[Bulb]
TYPE=MENU
PROMPT=Bulb of percussion:
MENU=Diffuse,Pronounced,Double,Absent,Indeterminate
CONDITION1=RecordCategory Flake AND
CONDITION2=Completeness Complete,Proximal,ProxButNearlyComp





[Lipping]
TYPE=MENU
PROMPT=Lipping on ventral:
MENU=Yes,No,Indeterminate
CONDITION1=RecordCategory Flake AND
CONDITION2=Completeness Complete,Proximal,ProxButNearlyComp





[FlakeTermination]
TYPE=MENU
PROMPT=Termination type:
MENU=Feather,Hinge,Step,Overshoot,Pointed,Splintered,Indeterminate
CONDITION1=RecordCategory Flake AND
CONDITION2=Completeness Complete,Distal

; ─── 8. Retouch (flake-side) ──────────────────────────────




[RetouchType]
TYPE=MENU
PROMPT=Retouch type:
MENU=NotchDenticulate,Backing,Burination,InvasiveEdgeShaping,MarginalEdgeShaping,Other
CONDITION1=LithicArtifactClass RetouchedPiece





[RetouchPosition]
TYPE=MENU
PROMPT=Retouch position:
MENU=Dorsal,Ventral,Bifacial,Alternating
CONDITION1=LithicArtifactClass RetouchedPiece





[RetouchExtent]
TYPE=MENU
PROMPT=Retouch extent:
MENU=Marginal,Invasive,Covering
CONDITION1=LithicArtifactClass RetouchedPiece

; ─── 9. Core attributes (core-side) ───────────────────────




[CoreFaces]
TYPE=MENU
PROMPT=Number of core faces:
MENU=One,Two,Three,Four,MoreThanFour,Indeterminate
CONDITION1=RecordCategory Core





[CoreScarCount]
TYPE=NUMERIC
PROMPT=Number of scars >6mm:
MIN=0
MAX=99
CONDITION1=RecordCategory Core





[CoreExploitation]
TYPE=MENU
PROMPT=Type of exploitation:
MENU=Recurrent,Preferential,Platform,Bipolar,Indeterminate
CONDITION1=RecordCategory Core





[IntendedProduct]
TYPE=MENU
PROMPT=Intended product:
MENU=Flake,BladeBladelet,Point,Indeterminate
CONDITION1=RecordCategory Core

; ─── 10. Measurements (both, conditional on what's present) ─




[MaxLength]
TYPE=NUMERIC
PROMPT=Maximum length (mm):
MIN=0
MAX=500





[MaxWidth]
TYPE=NUMERIC
PROMPT=Maximum width (mm):
MIN=0
MAX=500





[MaxThickness]
TYPE=NUMERIC
PROMPT=Maximum thickness (mm):
MIN=0
MAX=200





[TechLength]
TYPE=NUMERIC
PROMPT=Technological length (mm):
MIN=0
MAX=500
CONDITION1=RecordCategory Flake AND
CONDITION2=Completeness Complete,Proximal,ProxButNearlyComp





[Mass]
TYPE=NUMERIC
PROMPT=Mass (g):
MIN=0
MAX=10000

; ─── 11. Notes & photo ────────────────────────────────────




[HasNotes]
TYPE=MENU
PROMPT=Any further observations / notes?
MENU=No,Yes





[Notes]
TYPE=NOTE
PROMPT=Notes:
CONDITION1=HasNotes Yes





[Photograph]
TYPE=MENU
PROMPT=Photographed:
MENU=Yes,No





[PhotoPath]
TYPE=IMAGE
PROMPT=Photo file (path or filename):
CONDITION1=Photograph Yes





[Drawing]
TYPE=MENU
PROMPT=Drawn:
MENU=Yes,No
